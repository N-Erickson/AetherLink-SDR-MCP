name: Security Scan

on:
  # Run weekly on Monday at 9am UTC
  schedule:
    - cron: "0 9 * * 1"
  # Run on PRs that change dependencies
  pull_request:
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install package and audit tool
      run: |
        pip install -e .
        pip install pip-audit

    - name: Run pip-audit
      id: audit
      continue-on-error: true
      run: |
        pip-audit --format=json --output=audit-results.json 2>&1 || true
        pip-audit --desc 2>&1 | tee audit-results.txt

        # Check if there are real vulnerabilities (ignore pip itself)
        VULN_COUNT=$(pip-audit --format=json 2>/dev/null | python -c "
        import json, sys
        data = json.load(sys.stdin)
        real = [v for v in data.get('vulnerabilities', []) if v['name'] != 'pip']
        print(len(real))
        " 2>/dev/null || echo "0")

        echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"

        if [ "$VULN_COUNT" -gt 0 ]; then
          echo "Found $VULN_COUNT vulnerabilities (excluding pip)"
          exit 1
        else
          echo "No actionable vulnerabilities found"
        fi

    - name: Create issue on failure
      if: failure() && github.event_name == 'schedule'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VULN_COUNT="${{ steps.audit.outputs.vuln_count }}"
        BODY=$(cat <<'EOF'
        ## Dependency Security Alert

        The weekly security scan found **$VULN_COUNT** vulnerable dependencies.

        ```
        $(cat audit-results.txt)
        ```

        ### Next steps
        1. Review the vulnerabilities above
        2. Update affected packages in `pyproject.toml`
        3. Run `pip-audit` locally to verify fixes

        _This issue was created automatically by the security scan workflow._
        EOF
        )

        # Only create if no open security issue exists
        EXISTING=$(gh issue list --label "security" --state open --json number --jq length)
        if [ "$EXISTING" = "0" ]; then
          gh issue create \
            --title "Security: $VULN_COUNT vulnerable dependencies found" \
            --body "$BODY" \
            --label "security"
        fi
